name: Build & Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_prefix: ${{ steps.set_prefix.outputs.image_prefix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image prefix
        id: set_prefix
        run: |
          PREFIX="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image_prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_PREFIX=${PREFIX}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push proxy image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.proxy
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/proxy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          IMAGE_PREFIX="${{ needs.build.outputs.image_prefix }}"
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} bash -s << ENDSSH
            set -e
            cd /opt/ziyanisa
            git fetch origin main
            git reset --hard origin/main
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin
            export IMAGE_PREFIX="${IMAGE_PREFIX}"
            export GITHUB_REPOSITORY="${{ github.repository }}"
            docker compose pull proxy backend
            docker compose up -d --remove-orphans proxy backend mongodb
            docker image prune -f
            echo "Deploy complete at \$(date)"
          ENDSSH
