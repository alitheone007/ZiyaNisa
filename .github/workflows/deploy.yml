name: Build & Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_URL: /api
          CI: "false"
        run: npm run build

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync frontend build to server
        run: |
          rsync -az --delete \
            frontend/build/ \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/opt/ziyanisa/frontend/build/

      - name: Deploy backend & reload services
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << 'ENDSSH'
            set -e
            cd /opt/ziyanisa
            git fetch origin main
            git reset --hard origin/main
            source /opt/ziyanisa/venv/bin/activate
            pip install -q -r backend/requirements.txt
            sudo systemctl restart ziyanisa-backend
            sudo nginx -t && sudo systemctl reload nginx
            echo "Deploy complete at $(date)"
          ENDSSH
