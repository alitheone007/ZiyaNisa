# Upstream — FastAPI backend
upstream backend {
    server backend:8000;
}

# ── HTTP server ────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;          # replace with your subdomain once SSL is live

    # Let's Encrypt ACME challenge (needed to issue / renew certs)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Once you have SSL certs, uncomment the line below and remove the
    # location / and location /api/ blocks from this HTTP server block.
    # return 301 https://$host$request_uri;

    # ── API proxy ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── React SPA ──────────────────────────────────────────────────────────────
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
        expires    1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        root      /usr/share/nginx/html;
        expires   1y;
        add_header Cache-Control "public, immutable";
    }
}

