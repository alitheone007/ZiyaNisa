services:

  # ── Nginx reverse-proxy + React SPA ─────────────────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    image: ${IMAGE_PREFIX:-ghcr.io/alitheone007/ziyanisa}/proxy:latest
    container_name: ziyanisa-proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ziyanisa.rule=Host(`ziyanisa.bilionsales.com`)"
      - "traefik.http.routers.ziyanisa.entrypoints=websecure"
      - "traefik.http.routers.ziyanisa.tls.certresolver=letsencrypt"
      - "traefik.http.services.ziyanisa.loadbalancer.server.port=80"
    depends_on:
      - backend
    networks:
      - proxy
      - app

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  backend:
    build: ./backend
    image: ${IMAGE_PREFIX:-ghcr.io/alitheone007/ziyanisa}/backend:latest
    container_name: ziyanisa-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - mongodb
    networks:
      - app

  # ── MongoDB ───────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: ziyanisa-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app

  # ── Bilion AI Router ─────────────────────────────────────────────────────────
  # Multi-brand WhatsApp routing service. Called by n8n gateway workflow.
  # API docs: http://localhost:8001/docs
  router:
    build: ./router
    image: ${IMAGE_PREFIX:-ghcr.io/alitheone007/ziyanisa}/router:latest
    container_name: bilion-router
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - ROUTER_DB_NAME=bilion_router
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ADMIN_PHONE=${ADMIN_PHONE:-}
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-24}
    depends_on:
      - mongodb
    networks:
      - app
    # Internal only — not exposed externally (nginx proxies /router/ if needed)

  # ── n8n workflow engine ───────────────────────────────────────────────────────
  # Already running on server? Skip this block.
  # To start: docker compose --profile n8n up -d n8n
  n8n:
    image: n8nio/n8n:latest
    container_name: ziyanisa-n8n
    restart: unless-stopped
    profiles: ["n8n"]          # opt-in: docker compose --profile n8n up -d
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${DOMAIN}/n8n/
      - N8N_PATH=/n8n/
      - DB_TYPE=mongodb
      - DB_MONGODB_CONNECTION_URL=${MONGO_URL}
      - DB_MONGODB_DATABASE=n8n
      # Put your n8n encryption key here (generate: openssl rand -hex 32)
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change-in-prod}
      # Forward env vars that n8n workflows need
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - ZIYANISA_API_URL=http://backend:8000/api
      - BILION_ROUTER_URL=http://router:8001
      - CLAWBOT_URL=${CLAWBOT_URL:-}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - mongodb
    networks:
      - app

networks:
  proxy:
    external: true
  app:
    driver: bridge

volumes:
  mongo_data:
  n8n_data:
